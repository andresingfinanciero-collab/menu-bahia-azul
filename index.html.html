<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Menú — Hotel Bahía Azul</title>
<meta name="description" content="Carta digital del Hotel Bahía Azul - Costa Caribe Colombiana">
<meta name="theme-color" content="#1a3a5c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b08d57;
  --gold-light: #c9a96e;
  --gold-soft: #d4bc8a;
  --gold-pale: #f0e6d3;
  --blue-deep: #1a3a5c;
  --blue-mid: #2a6496;
  --blue-soft: #5a9cc5;
  --blue-sky: #c5dff0;
  --blue-pale: #e8f2fa;
  --sand: #faf7f2;
  --sand-dark: #efe9de;
  --brown: #7a6545;
  --brown-light: #a08a68;
  --text-dark: #2c2419;
  --text-mid: #5c5042;
  --text-light: #8a7e6e;
  --white: #ffffff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--sand);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.view { display: none; }
.view.active { display: block; }

/* ═══ HERO ═══ */
.hero {
  position: relative;
  background: linear-gradient(165deg, var(--blue-deep) 0%, #1e4a6e 40%, var(--blue-mid) 100%);
  padding: 2.5rem 1.5rem 3.5rem;
  text-align: center;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60%;
  right: -30%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(176,141,87,0.12) 0%, transparent 70%);
  border-radius: 50%;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 30px;
  background: var(--sand);
  border-radius: 24px 24px 0 0;
}

.hero-logo {
  width: 140px;
  height: auto;
  margin: 0 auto 0.8rem;
  display: block;
  border-radius: 12px;
  position: relative;
  z-index: 1;
}

.hero-menu-label {
  display: inline-block;
  margin-top: 0.6rem;
  padding: 0.4rem 1.6rem;
  border: 1px solid rgba(176,141,87,0.35);
  border-radius: 30px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  color: var(--gold-light);
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}

/* ═══ CATEGORIES GRID ═══ */
.categories-section {
  padding: 1.5rem 1rem 3rem;
  max-width: 600px;
  margin: 0 auto;
}

.section-label {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 1rem;
  padding-left: 0.25rem;
}

.categories-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.75rem;
}

.cat-card {
  position: relative;
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  color: inherit;
}

.cat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.cat-card:active { transform: scale(0.97); }

.cat-card-accent {
  height: 5px;
  width: 100%;
}

.cat-card-body {
  padding: 1rem 0.9rem 1.1rem;
}

.cat-card-name {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 0.92rem;
  color: var(--text-dark);
  line-height: 1.2;
}

.cat-card-count {
  font-size: 0.68rem;
  font-weight: 400;
  color: var(--text-light);
  margin-top: 0.2rem;
}

.cat-card-arrow {
  position: absolute;
  right: 0.85rem;
  bottom: 0.85rem;
  width: 20px;
  height: 20px;
  color: var(--gold-soft);
}

/* Accent color themes */
.accent-ocean { background: var(--blue-mid); }
.accent-gold { background: var(--gold); }
.accent-coral { background: #c47a5a; }
.accent-sage { background: #7a9e7e; }
.accent-sand { background: var(--brown-light); }
.accent-sky { background: var(--blue-soft); }
.accent-peach { background: #c99a6b; }
.accent-mint { background: #6aab8e; }
.accent-lavender { background: #9a8ab5; }
.accent-warm { background: #b5936a; }

/* ═══ DETAIL VIEW ═══ */
.detail-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--white);
  display: flex;
  align-items: center;
  padding: 0.85rem 1rem;
  box-shadow: var(--shadow-sm);
  gap: 0.8rem;
}

.back-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: var(--sand);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
}

.back-btn:hover { background: var(--sand-dark); }

.back-btn svg {
  width: 18px;
  height: 18px;
  stroke: var(--text-dark);
}

.detail-title {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 1.1rem;
  color: var(--text-dark);
  flex: 1;
}

.detail-content {
  max-width: 600px;
  margin: 0 auto;
  padding: 0.75rem 1rem 4rem;
}

.detail-note {
  text-align: center;
  font-size: 0.75rem;
  font-style: italic;
  color: var(--blue-soft);
  padding: 0.8rem 1rem;
  background: var(--blue-pale);
  border-radius: var(--radius-sm);
  margin-bottom: 0.75rem;
}

/* ═══ MENU ITEM CARD ═══ */
.item-card {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 1rem 1.1rem;
  margin-bottom: 0.5rem;
  box-shadow: var(--shadow-sm);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  transition: box-shadow 0.2s;
}

.item-card:hover { box-shadow: var(--shadow-md); }
.item-card-info { flex: 1; }

.item-card-name {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text-dark);
  line-height: 1.25;
}

.item-card-desc {
  font-size: 0.76rem;
  font-weight: 300;
  color: var(--text-light);
  margin-top: 0.25rem;
  line-height: 1.4;
}

.item-card-price {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.92rem;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
  background: var(--gold-pale);
  padding: 0.3rem 0.7rem;
  border-radius: 8px;
  margin-top: 0.1rem;
}

/* ═══ SUBCATEGORY DIVIDER ═══ */
.sub-divider {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin: 1.2rem 0 0.6rem;
  padding: 0 0.2rem;
}

.sub-divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold-soft), transparent);
}

.sub-divider-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ═══ FOOTER ═══ */
.footer {
  text-align: center;
  padding: 2rem 1.5rem 2.5rem;
  border-top: 1px solid var(--sand-dark);
}

.footer-logo-img {
  width: 80px;
  height: auto;
  margin: 0 auto 0.4rem;
  display: block;
  opacity: 0.6;
}

.footer-text {
  font-size: 0.65rem;
  color: var(--text-light);
  margin-top: 0.3rem;
  letter-spacing: 0.03em;
}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.cat-card {
  animation: fadeInUp 0.4s ease both;
}

.cat-card:nth-child(1) { animation-delay: 0.02s; }
.cat-card:nth-child(2) { animation-delay: 0.06s; }
.cat-card:nth-child(3) { animation-delay: 0.1s; }
.cat-card:nth-child(4) { animation-delay: 0.14s; }
.cat-card:nth-child(5) { animation-delay: 0.18s; }
.cat-card:nth-child(6) { animation-delay: 0.22s; }
.cat-card:nth-child(7) { animation-delay: 0.26s; }
.cat-card:nth-child(8) { animation-delay: 0.3s; }
.cat-card:nth-child(9) { animation-delay: 0.34s; }
.cat-card:nth-child(10) { animation-delay: 0.38s; }
.cat-card:nth-child(11) { animation-delay: 0.42s; }
.cat-card:nth-child(12) { animation-delay: 0.46s; }
.cat-card:nth-child(n+13) { animation-delay: 0.5s; }

.item-card { animation: fadeInUp 0.35s ease both; }
.view-transition { animation: fadeIn 0.25s ease; }

@media (min-width: 480px) {
  .categories-grid { gap: 1rem; }
  .hero-logo { width: 170px; }
}

@media (min-width: 700px) {
  .categories-grid { grid-template-columns: repeat(3, 1fr); }
  .categories-section { max-width: 720px; }
  .detail-content { max-width: 680px; }
}
</style>
</head>

function formatPrice(p) {
  return '$ ' + p.toLocaleString('es-CO');
}

function renderCategories() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = menuData.map(cat => {
    const count = cat.items.filter(it => !it.sub).length;
    return `
      <div class="cat-card" onclick="openCategory('${cat.id}')">
        <div class="cat-card-accent accent-${cat.accent}"></div>
        <div class="cat-card-body">
          <div class="cat-card-name">${cat.name}</div>
          <div class="cat-card-count">${count} ${count === 1 ? 'opción' : 'opciones'}</div>
        </div>
        <svg class="cat-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
    `;
  }).join('');
}

function renderItems(cat) {
  let html = '';
  if (cat.note) {
    html += `<div class="detail-note">${cat.note}</div>`;
  }
  cat.items.forEach((item, i) => {
    if (item.sub) {
      html += `
        <div class="sub-divider">
          <div class="sub-divider-line"></div>
          <div class="sub-divider-text">${item.sub}</div>
          <div class="sub-divider-line" style="background:linear-gradient(270deg, var(--gold-soft), transparent)"></div>
        </div>`;
    } else {
      html += `
        <div class="item-card" style="animation-delay:${i * 0.03}s">
          <div class="item-card-info">
            <div class="item-card-name">${item.name}</div>
            ${item.desc ? `<div class="item-card-desc">${item.desc}</div>` : ''}
          </div>
          <div class="item-card-price">${formatPrice(item.price)}</div>
        </div>`;
    }
  });
  return html;
}

function openCategory(id) {
  const cat = menuData.find(c => c.id === id);
  if (!cat) return;
  document.getElementById('detailTitle').textContent = cat.name;
  document.getElementById('detailContent').innerHTML = renderItems(cat);
  document.getElementById('homeView').classList.remove('active');
  document.getElementById('detailView').classList.add('active', 'view-transition');
  window.scrollTo(0, 0);
  history.pushState({ cat: id }, '', '#' + id);
}

function goHome() {
  document.getElementById('detailView').classList.remove('active', 'view-transition');
  document.getElementById('homeView').classList.add('active');
  window.scrollTo(0, 0);
  history.pushState({}, '', location.pathname);
}

window.addEventListener('popstate', () => {
  if (document.getElementById('detailView').classList.contains('active')) {
    goHome();
  }
});

// Handle direct hash links
if (location.hash) {
  const id = location.hash.slice(1);
  if (menuData.find(c => c.id === id)) {
    setTimeout(() => openCategory(id), 100);
  }
}

renderCategories();
</script>
